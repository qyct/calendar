<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDFAF6;--stone:#F4EFE8;--warm-border:#E8DFD2;--muted:#9E8F7E;
  --dark:#2A2420;--ink:#3D3530;--accent:#8B6F4E;--accent-light:#F0E8DC;
  --accent-dark:#5C4A35;--today-bg:#2A2420;--today-color:#FDFAF6;
  --sun:#A05C3C;--sat:#7A8C6E;--hover:#EDE5D8;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--cream);color:var(--ink);font-family:'Jost',sans-serif}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
#app{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden}
.hdr{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.4rem;border-bottom:1px solid var(--warm-border);background:var(--cream);gap:1rem;
}
.hdr-left{display:flex;align-items:baseline;gap:0.8rem;min-width:0}
.yr-title{
  font-family:'Cormorant Garamond',serif;font-weight:300;letter-spacing:-0.01em;
  color:var(--dark);cursor:pointer;transition:color .2s;line-height:1;white-space:nowrap
}
.yr-title:hover{color:var(--accent)}
.yr-range{font-weight:400;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:0.4rem;flex-shrink:0}
.sel-info{
  letter-spacing:0.06em;color:var(--muted);padding:0.15rem 0.5rem;
  border-left:2px solid var(--accent);opacity:0;transition:opacity .2s;white-space:nowrap
}
.sel-info.vis{opacity:1}
.zoom-badge{
  letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);
  background:var(--stone);border:1px solid var(--warm-border);border-radius:10px;white-space:nowrap
}
.btn{
  font-family:'Jost',sans-serif;font-weight:400;letter-spacing:0.08em;
  text-transform:uppercase;border-radius:2px;border:1px solid var(--warm-border);
  background:transparent;color:var(--ink);cursor:pointer;transition:all .18s;white-space:nowrap
}
.btn:hover{background:var(--stone);border-color:var(--accent);color:var(--accent-dark)}
.btn-primary{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.btn-primary:hover{background:var(--accent-dark);border-color:var(--accent-dark);color:var(--cream)}
.btn-nav{font-size:1rem;font-weight:300;color:var(--muted)}
.btn-nav:hover{color:var(--dark);border-color:var(--accent);background:var(--stone)}
.btn-font{font-size:1.1rem;font-weight:400;color:var(--muted);min-width:1.8em;text-align:center}
.btn-font:hover{color:var(--dark);border-color:var(--accent);background:var(--stone)}
.btn-font:disabled{opacity:0.3;cursor:not-allowed}
.btn-font:disabled:hover{background:transparent;border-color:var(--warm-border);color:var(--muted)}
.fy-toggle{display:flex;border:1px solid var(--warm-border);border-radius:3px;overflow:hidden;flex-shrink:0}
.fy-toggle .btn{border:none;border-radius:0;letter-spacing:0.06em;font-size:inherit}
.fy-toggle .btn+.btn{border-left:1px solid var(--warm-border)}
.fy-toggle .btn.active{background:var(--dark);color:var(--cream);border-color:var(--dark)}
.fy-toggle .btn.active:hover{background:var(--accent-dark)}
.hdiv{width:1px;height:16px;background:var(--warm-border);flex-shrink:0}
#main{flex:1 1 0;min-height:0;padding:0.6rem 1rem;overflow:hidden}
.months-grid{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
  grid-template-rows:repeat(3,minmax(0,1fr));
  gap:1px;background:var(--warm-border);border:1px solid var(--warm-border);
  border-radius:3px;overflow:hidden;width:100%;height:100%
}
.month-card{
  background:var(--cream);display:flex;flex-direction:column;
  overflow:hidden;transition:background .15s;cursor:default
}
.month-card:hover{background:var(--stone)}
.month-card.cur-month{background:var(--accent-light)}
.month-card.fy-start{border-top:2px solid var(--accent)}
.month-head{
  font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:0.03em;
  color:var(--dark);flex-shrink:0;text-align:left
}
.days-header{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));flex-shrink:0}
.day-name{text-align:center;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.day-name:first-child{color:var(--sun)}
.day-name:last-child{color:var(--sat)}
.days-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));flex:1;align-content:start}
.day-cell{
  display:flex;align-items:center;justify-content:center;
  font-weight:400;color:var(--ink);cursor:pointer;transition:background .1s,color .1s;border-radius:2px;
}
.day-cell:hover{background:var(--hover)}
.day-cell.sun{color:var(--sun)}
.day-cell.sat{color:var(--sat)}
.day-cell.empty{cursor:default}
.day-cell.empty:hover{background:transparent}
.day-cell.today{background:var(--today-bg);color:var(--today-color);font-weight:500}
.day-cell.today:hover{background:var(--accent-dark)}
.day-cell.sel:not(.today){background:var(--accent);color:var(--cream)}
.years-grid{
  display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
  grid-template-rows:repeat(4,minmax(0,1fr));
  gap:1px;background:var(--warm-border);border:1px solid var(--warm-border);
  border-radius:3px;overflow:hidden;width:100%;height:100%
}
.year-cell{
  font-family:'Cormorant Garamond',serif;font-weight:300;letter-spacing:-0.01em;
  border:none;background:var(--cream);color:var(--ink);cursor:pointer;
  transition:all .18s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.3rem
}
.year-cell:hover{background:var(--stone);color:var(--accent-dark)}
.year-cell.sel-yr{background:var(--dark);color:var(--cream)}
.year-cell.cur-yr{background:var(--accent-light);color:var(--accent-dark)}
.year-cell.cur-yr.sel-yr{background:var(--dark);color:var(--cream)}
.year-cell.oor{color:var(--warm-border);background:#F8F4EF}
.yr-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0}
.year-cell.sel-yr .yr-dot{background:var(--cream);opacity:.5}
</style>
</head>
<body>
<h2 class="sr-only">Year-at-a-glance calendar — all months visible at once, no scroll required.</h2>
<div id="app">
  <header class="hdr" id="hdr">
    <div class="hdr-left">
      <span class="yr-title" id="yrTitle"></span>
      <span class="yr-range" id="yrRange"></span>
    </div>
    <div class="hdr-right">
      <span class="sel-info" id="selInfo"></span>
      <button class="btn btn-nav" id="btnPrev">&#8592;</button>
      <button class="btn btn-nav" id="btnNext">&#8594;</button>
      <div class="hdiv"></div>
      <button class="btn btn-primary" id="btnToday">Today</button>
      <button class="btn" id="btnZoom"></button>
      <div class="hdiv"></div>
      <div class="fy-toggle">
        <button class="btn active" id="btnCY">CY</button>
        <button class="btn" id="btnFY">FY</button>
      </div>
      <div class="hdiv"></div>
      <button class="btn btn-font" id="btnFontDec" title="Decrease font size">&#8722;</button>
      <button class="btn btn-font" id="btnFontInc" title="Increase font size">&#43;</button>
      <div class="hdiv"></div>
      <span class="zoom-badge" id="zBadge"></span>
    </div>
  </header>
  <main id="main"></main>
</div>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['S','M','T','W','T','F','S'];
const today=new Date();

const FONT_MIN=0.7,FONT_MAX=1.6,FONT_STEP=0.1;
/* viewYear = the year the period STARTS in:
   CY 2025 → Jan–Dec 2025
   FY 2025 → Apr 2025–Mar 2026 (labelled "FY 2025–26") */
let state={viewYear:today.getFullYear(),zoom:'months',selected:null,fontScale:1.15,yearMode:'CY'};

/* Financial year that today falls in: month >= March(3) → starts this year, else last year */
function fyOfToday(){return today.getMonth()>=3?today.getFullYear():today.getFullYear()-1}

const $=id=>document.getElementById(id);
const main=$('main');

function getDays(y,m){return new Date(y,m+1,0).getDate()}
function getFirst(y,m){return new Date(y,m,1).getDay()}
function isToday(y,m,d){return y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate()}
function getYears(){const s=Math.floor(state.viewYear/12)*12-1;return Array.from({length:16},(_,i)=>s+i)}
function fmtDate(y,m,d){return new Date(y,m,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}

/* Returns ordered array of {y, m} for the 12 months to render */
function getMonthList(){
  if(state.yearMode==='CY'){
    return Array.from({length:12},(_,i)=>({y:state.viewYear,m:i}));
  }
  /* FY: Apr(3)..Mar(2) — months 3–14 mod 12, year wraps after Dec */
  return Array.from({length:12},(_,i)=>{
    const raw=3+i;
    return{y:state.viewYear+(raw>=12?1:0),m:raw%12};
  });
}

function computeSizes(){
  const hdrH=$('hdr').offsetHeight;
  const availH=window.innerHeight-hdrH;
  const availW=window.innerWidth;
  const pad=16;
  const innerH=availH-pad*1.2;
  const innerW=availW-pad*2;
  const sc=state.fontScale;
  if(state.zoom==='months'){
    const cols=4,rows=3,gap=1;
    const cellW=(innerW-(cols-1)*gap)/cols;
    const cellH=(innerH-(rows-1)*gap)/rows;
    const headH=Math.max(cellH*0.13,12);
    const dayNameH=Math.max(cellH*0.1,9);
    const dayCellH=(cellH-headH-dayNameH-8)/6;
    const dayCellW=cellW/7;
    const dayCellSz=Math.min(dayCellH,dayCellW);
    const fs_head=Math.min(Math.max(cellH*0.095*sc,9),20);
    const fs_dayName=Math.min(Math.max(dayCellSz*0.42*sc,6),13);
    const fs_day=Math.min(Math.max(dayCellSz*0.45*sc,7),15);
    const pad_card=Math.max(cellH*0.04,3);
    return{cellW,cellH,headH,dayNameH,dayCellSz,fs_head,fs_dayName,fs_day,pad_card};
  } else {
    const cols=4,rows=4,gap=1;
    const cellW=(innerW-(cols-1)*gap)/cols;
    const cellH=(innerH-(rows-1)*gap)/rows;
    const fs_year=Math.min(Math.max(cellH*0.28*sc,14),52);
    return{cellW,cellH,fs_year};
  }
}

function applyHdrSizes(){
  const w=window.innerWidth;
  const sc=state.fontScale;
  $('hdr').style.height=Math.max(w*0.038,36)+'px';
  $('yrTitle').style.fontSize=Math.max(w*0.028*sc,18)+'px';
  $('yrRange').style.fontSize=Math.max(w*0.013*sc,9)+'px';
  $('selInfo').style.fontSize=Math.max(w*0.012*sc,8.5)+'px';
  $('zBadge').style.fontSize=Math.max(w*0.011*sc,8)+'px';
  $('zBadge').style.padding=Math.max(w*0.003,2)+'px '+Math.max(w*0.008,5)+'px';
  document.querySelectorAll('.btn').forEach(b=>{
    b.style.fontSize=Math.max(w*0.012*sc,8.5)+'px';
    b.style.padding=Math.max(w*0.004,3)+'px '+Math.max(w*0.009,6)+'px';
  });
  $('btnFontDec').disabled=state.fontScale<=FONT_MIN;
  $('btnFontInc').disabled=state.fontScale>=FONT_MAX;
  $('btnCY').classList.toggle('active',state.yearMode==='CY');
  $('btnFY').classList.toggle('active',state.yearMode==='FY');
}

function render(){
  applyHdrSizes();
  updateHeader();
  state.zoom==='months'?renderMonths():renderYears();
}

function updateHeader(){
  if(state.zoom==='months'){
    if(state.yearMode==='FY'){
      $('yrTitle').textContent='FY '+state.viewYear+'–'+(String(state.viewYear+1).slice(-2));
      $('yrRange').textContent='Apr–Mar';
    } else {
      $('yrTitle').textContent=state.viewYear;
      $('yrRange').textContent='';
    }
    $('zBadge').textContent='Year view';
    $('btnZoom').textContent='Decades';
  } else {
    const yrs=getYears();
    $('yrTitle').textContent=yrs[0]+'–'+yrs[yrs.length-1];
    $('yrRange').textContent='';
    $('zBadge').textContent='Decade view';
    $('btnZoom').textContent='Months';
  }
  const si=$('selInfo');
  if(state.selected){const{y,m,d}=state.selected;si.textContent=fmtDate(y,m,d);si.classList.add('vis')}
  else si.classList.remove('vis');
}

function renderMonths(){
  const sz=computeSizes();
  main.innerHTML='';
  const grid=document.createElement('div');
  grid.className='months-grid';
  grid.style.cssText=`height:${main.clientHeight-8}px`;

  const monthList=getMonthList();
  const isCurPeriod=state.yearMode==='CY'
    ?state.viewYear===today.getFullYear()
    :state.viewYear===fyOfToday();

  monthList.forEach(({y,m},idx)=>{
    const card=document.createElement('div');
    card.className='month-card';
    if(isCurPeriod&&m===today.getMonth())card.classList.add('cur-month');
    if(idx===0)card.classList.add('fy-start');
    card.style.padding=sz.pad_card+'px '+sz.pad_card*1.2+'px';

    const head=document.createElement('div');
    head.className='month-head';
    head.style.cssText=`font-size:${sz.fs_head}px;margin-bottom:${sz.pad_card*0.4}px`;
    /* In FY mode, Jan/Feb/Mar belong to the next calendar year — show year suffix for clarity */
    head.textContent=(state.yearMode==='FY'&&m<=2)?MONTHS[m]+' '+y:MONTHS[m];
    card.appendChild(head);

    const dh=document.createElement('div');
    dh.className='days-header';
    dh.style.marginBottom=sz.pad_card*0.3+'px';
    DAYS.forEach((dn,di)=>{
      const el=document.createElement('div');
      el.className='day-name';
      el.style.fontSize=sz.fs_dayName+'px';
      if(di===0)el.style.color='var(--sun)';
      if(di===6)el.style.color='var(--sat)';
      el.textContent=dn;
      dh.appendChild(el);
    });
    card.appendChild(dh);

    const dg=document.createElement('div');
    dg.className='days-grid';
    const first=getFirst(y,m);
    const total=getDays(y,m);
    for(let i=0;i<first;i++){
      const e=document.createElement('div');e.className='day-cell empty';
      e.style.height=sz.dayCellSz+'px';dg.appendChild(e);
    }
    for(let d=1;d<=total;d++){
      const el=document.createElement('div');
      const dow=(first+d-1)%7;
      let cls='day-cell';
      if(dow===0)cls+=' sun';
      if(dow===6)cls+=' sat';
      if(isToday(y,m,d))cls+=' today';
      if(state.selected&&state.selected.y===y&&state.selected.m===m&&state.selected.d===d&&!isToday(y,m,d))cls+=' sel';
      el.className=cls;
      el.style.cssText=`height:${sz.dayCellSz}px;font-size:${sz.fs_day}px`;
      el.textContent=d;
      el.addEventListener('click',()=>{state.selected={y,m,d};render()});
      dg.appendChild(el);
    }
    card.appendChild(dg);
    grid.appendChild(card);
  });
  main.appendChild(grid);
}

function renderYears(){
  const sz=computeSizes();
  main.innerHTML='';
  const yrs=getYears();
  const curY=state.yearMode==='CY'?today.getFullYear():fyOfToday();
  const grid=document.createElement('div');
  grid.className='years-grid';
  grid.style.height=main.clientHeight-8+'px';

  yrs.forEach((y,i)=>{
    const btn=document.createElement('button');
    btn.className='year-cell';
    if(y===state.viewYear)btn.classList.add('sel-yr');
    if(y===curY)btn.classList.add('cur-yr');
    if(i===0||i===yrs.length-1)btn.classList.add('oor');
    btn.style.fontSize=sz.fs_year+'px';
    const span=document.createElement('span');
    span.textContent=state.yearMode==='FY'?y+'–'+(String(y+1).slice(-2)):y;
    btn.appendChild(span);
    if(y===curY){const dot=document.createElement('span');dot.className='yr-dot';btn.appendChild(dot)}
    btn.addEventListener('click',()=>{state.viewYear=y;state.zoom='months';render()});
    grid.appendChild(btn);
  });
  main.appendChild(grid);
}

function navPrev(){state.zoom==='months'?state.viewYear--:state.viewYear-=12;render()}
function navNext(){state.zoom==='months'?state.viewYear++:state.viewYear+=12;render()}

$('btnPrev').addEventListener('click',navPrev);
$('btnNext').addEventListener('click',navNext);
$('btnToday').addEventListener('click',()=>{
  state.viewYear=state.yearMode==='CY'?today.getFullYear():fyOfToday();
  state.zoom='months';render();
});
$('btnZoom').addEventListener('click',()=>{state.zoom=state.zoom==='months'?'years':'months';render()});
$('yrTitle').addEventListener('click',()=>{state.zoom=state.zoom==='months'?'years':'months';render()});

$('btnCY').addEventListener('click',()=>{if(state.yearMode==='CY')return;state.yearMode='CY';render()});
$('btnFY').addEventListener('click',()=>{if(state.yearMode==='FY')return;state.yearMode='FY';render()});

$('btnFontInc').addEventListener('click',()=>{
  if(state.fontScale<FONT_MAX){state.fontScale=Math.round((state.fontScale+FONT_STEP)*10)/10;render()}
});
$('btnFontDec').addEventListener('click',()=>{
  if(state.fontScale>FONT_MIN){state.fontScale=Math.round((state.fontScale-FONT_STEP)*10)/10;render()}
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){navPrev()}
  else if(e.key==='ArrowRight'){navNext()}
  else if(e.key==='+'||e.key==='='){
    if(state.fontScale<FONT_MAX){state.fontScale=Math.round((state.fontScale+FONT_STEP)*10)/10;render()}
  } else if(e.key==='-'){
    if(state.fontScale>FONT_MIN){state.fontScale=Math.round((state.fontScale-FONT_STEP)*10)/10;render()}
  }
});

let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(render,60)});

render();
</script>
</body>
</html>
